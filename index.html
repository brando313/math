<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fact Board">
<title>Fact Board — Multiplication &amp; Division</title>
<style>
  :root{
    --ice:#EFF4F9;
    --panel:#FFFFFF;
    --ink:#17263F;
    --ink-soft:#5A6B84;
    --line:#D9E3ED;
    --navy:#1B2B47;
    --navy-deep:#142238;
    --gold:#F0A81C;
    --green:#2E9E5B;
    --green-soft:#DDF2E5;
    --yellow:#F0C243;
    --yellow-soft:#FBF0CE;
    --pending:#E2E9F1;
    --radius:18px;
    --display:ui-rounded,-apple-system,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
    --body:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;background:var(--ice);color:var(--ink);
    font-family:var(--body);
    -webkit-user-select:none;user-select:none;
    overscroll-behavior:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;}
  .hidden{display:none !important;}
  .screen{max-width:1200px;margin:0 auto;padding:16px 20px;height:100%;}

  /* ---------- shared bits ---------- */
  .brand{font-family:var(--display);font-weight:800;letter-spacing:-0.02em;}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--panel);border:1.5px solid var(--line);border-radius:999px;
    padding:6px 14px;font-weight:600;font-size:15px;color:var(--ink-soft);
  }
  .btn{
    font-family:var(--display);font-weight:700;font-size:17px;
    border-radius:14px;padding:12px 20px;border:1.5px solid var(--line);
    background:var(--panel);color:var(--ink);
    transition:transform .06s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--navy);border-color:var(--navy);color:#fff;}
  .btn-gold{background:var(--gold);border-color:var(--gold);color:var(--navy-deep);}
  .btn-quiet{color:var(--ink-soft);}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
  .dot.green{background:var(--green);}
  .dot.yellow{background:var(--yellow);}
  .dot.pending{background:var(--pending);}

  /* ---------- home ---------- */
  #home{display:flex;flex-direction:column;gap:22px;justify-content:center;min-height:100%;}
  .home-card{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);padding:20px 22px;}
  .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:900px;width:100%;margin:0 auto;}
  .section-label{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:12px;}
  .learner-row{display:flex;gap:12px;}
  .learner-btn{
    flex:1;font-family:var(--display);font-size:24px;font-weight:800;
    padding:22px 10px;border-radius:14px;border:2px solid var(--line);background:#fff;
  }
  .learner-btn.selected{border-color:var(--navy);background:var(--navy);color:#fff;}
  .toggle-row{display:flex;gap:10px;margin-bottom:14px;}
  .op-grid{display:grid;grid-template-columns:1fr 1fr;}
  .toggle-row:last-child{margin-bottom:0;}
  .toggle-btn{
    flex:1;font-family:var(--display);font-weight:700;font-size:18px;
    padding:14px 8px;border-radius:12px;border:2px solid var(--line);background:#fff;color:var(--ink-soft);
  }
  .toggle-btn.selected{border-color:var(--gold);background:var(--gold);color:var(--navy-deep);}
  .toggle-note{font-size:13px;color:var(--ink-soft);margin-top:10px;line-height:1.4;}
  .home-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .home-actions .btn{font-size:19px;padding:16px 30px;}
  #resumeBtn{border-style:dashed;}

  /* ---------- session ---------- */
  #session{display:flex;flex-direction:column;gap:14px;min-height:100%;}
  .topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .topbar .spacer{flex:1;}
  .topbar .brand{font-size:20px;}
  .main{flex:1;display:flex;gap:18px;align-items:stretch;min-height:0;}

  .board{
    background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:16px;display:flex;flex-direction:column;gap:12px;flex:0 0 auto;
  }
  .grid{display:grid;gap:4px;}
  .cell,.hdr{
    width:24px;height:24px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
  }
  .hdr{font-size:11px;font-weight:700;color:var(--ink-soft);font-family:var(--display);}
  .cell{background:var(--pending);}
  .cell.green{background:var(--green);}
  .cell.yellow{background:var(--yellow);}
  .cell.current{box-shadow:0 0 0 2.5px var(--navy);}
  .legend{display:flex;gap:16px;font-size:13px;color:var(--ink-soft);align-items:center;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .board-count{font-family:var(--display);font-weight:700;font-size:14px;color:var(--ink-soft);}

  .play{flex:1;display:flex;flex-direction:column;gap:14px;min-width:0;}

  /* the jumbotron card — signature element */
  .card{
    background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);
    border-radius:22px;color:#fff;
    padding:26px 28px 22px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.08), 0 10px 30px rgba(20,34,56,.18);
    position:relative;
  }
  .card .prompt{
    font-family:var(--display);font-weight:800;
    font-size:clamp(56px,9vw,88px);letter-spacing:.01em;
    font-variant-numeric:tabular-nums;line-height:1;
  }
  .answer-slot{
    min-width:170px;text-align:center;
    font-family:var(--display);font-weight:800;
    font-size:clamp(44px,7vw,64px);line-height:1.15;
    color:var(--gold);font-variant-numeric:tabular-nums;
    border-bottom:5px solid var(--gold);
    min-height:1.2em;
  }
  .card .status{
    height:24px;font-size:17px;font-weight:700;letter-spacing:.02em;
    color:rgba(255,255,255,.85);font-family:var(--display);
  }
  .card.correct .answer-slot{color:#5FD68F;border-color:#5FD68F;}

  /* stacked paper-arithmetic layout for advanced +/- */
  .stack{
    font-family:var(--display);font-weight:800;
    font-size:clamp(40px,6.5vw,60px);line-height:1.2;
    font-variant-numeric:tabular-nums;
    width:8ch;max-width:100%;
  }
  .st-row{display:flex;justify-content:flex-end;gap:.45ch;}
  .st-bot{border-bottom:5px solid rgba(255,255,255,.85);padding-bottom:8px;}
  .st-op{color:var(--gold);}

  /* borrowing scratchpad */
  .card.colmode .stack{margin-top:1.15em;}
  .card.colmode{--colw:1.5ch;}
  .card.colmode .bcol{width:var(--colw);min-width:0;}
  .dgrp{display:inline-flex;}
  .dgrp .dcell{width:var(--colw);text-align:center;}
  .card.stacked.colmode .answer-slot{
    width:8ch;display:flex;justify-content:flex-end;
    border-bottom:none;min-width:0;
  }
  .abox{
    width:var(--colw);height:1.3em;box-sizing:border-box;
    display:flex;align-items:center;justify-content:center;
    border:2.5px solid rgba(255,255,255,.22);border-radius:9px;
    color:var(--gold);font-variant-numeric:tabular-nums;
    cursor:pointer;
  }
  .abox:active{transform:scale(.94);}
  .abox.active{
    border-color:var(--gold);
    background:rgba(240,168,28,.14);
    box-shadow:0 0 0 2px rgba(240,168,28,.28);
  }
  .bcol.colactive .borig{color:#FFE1A0;}
  .card.correct .abox{border-color:#5FD68F;color:#5FD68F;}
  .bcol{
    position:relative;display:inline-block;min-width:1ch;text-align:center;
    transition:transform .12s ease;touch-action:none;
    -webkit-touch-callout:none;
  }
  .bcol .borig{display:inline-block;}
  .bcol.bmod .borig{
    text-decoration:line-through;
    text-decoration-thickness:4px;
    text-decoration-color:rgba(255,255,255,.65);
    opacity:.5;
  }
  .bcol .scratch{
    position:absolute;bottom:1.02em;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;
    font-size:.42em;line-height:1.1;color:var(--gold);
    white-space:nowrap;
  }
  .sv{display:block;}
  .sv.old{text-decoration:line-through;text-decoration-thickness:2px;opacity:.5;}
  .sv.waiting{opacity:.35;}
  .sv.active{min-width:.6em;min-height:1em;}
  .sv.active::after{
    content:"";display:inline-block;width:3px;height:.85em;
    background:var(--gold);margin-left:2px;vertical-align:baseline;
    animation:blinkCaret 1s steps(1) infinite;
  }
  .scratch.active::after{
    content:"";display:inline-block;width:3px;height:.85em;
    background:var(--gold);margin-left:2px;vertical-align:baseline;
    animation:blinkCaret 1s steps(1) infinite;
  }
  @keyframes blinkCaret{50%{opacity:0;}}
  .scratch.waiting{opacity:.35;}
  .bcol.holding{transform:scale(1.18);}
  .bcol.colshake{animation:shake .35s;}
  .bcol.pop .scratch{animation:popIn .28s ease;}
  @keyframes popIn{from{transform:translateX(-50%) scale(.2);}to{transform:translateX(-50%) scale(1);}}
  #clearWork{
    position:absolute;top:12px;right:14px;
    font-family:var(--display);font-weight:700;font-size:14px;
    color:rgba(255,255,255,.8);background:rgba(255,255,255,.12);
    border-radius:10px;padding:7px 12px;
  }
  #clearWork:active{background:rgba(255,255,255,.28);}
  .borrow-hint{font-size:13px;font-weight:600;color:rgba(255,255,255,.5);}
  .card.stacked .answer-slot{
    font-size:clamp(40px,6.5vw,60px);
    width:8ch;max-width:100%;min-width:0;
    text-align:right;border-bottom:none;
  }
  .card.shake{animation:shake .4s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-9px);}40%{transform:translateX(9px);}
    60%{transform:translateX(-6px);}80%{transform:translateX(6px);}
  }
  @media (prefers-reduced-motion: reduce){
    .card.shake{animation:none;}
    .btn:active,.key:active{transform:none;}
  }

  .keypad{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
    max-width:460px;width:100%;margin:0 auto;
  }
  .key{
    font-family:var(--display);font-weight:800;font-size:32px;
    padding:16px 0;border-radius:16px;
    background:var(--panel);border:1.5px solid var(--line);color:var(--ink);
    transition:transform .05s ease;
  }
  .key:active{transform:scale(.95);background:#F3F7FB;}
  .key.enter{background:var(--gold);border-color:var(--gold);color:var(--navy-deep);}
  .key.enter.borrowing{background:#2FA3B8;border-color:#2FA3B8;color:#fff;}
  .key.back{color:var(--ink-soft);font-size:26px;}

  /* ---------- done ---------- */
  #done{display:flex;flex-direction:column;gap:20px;justify-content:center;align-items:center;min-height:100%;text-align:center;}
  #done h1{font-family:var(--display);font-size:42px;margin:0;}
  .stat-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
  .stat{
    background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:18px 26px;min-width:130px;
  }
  .stat .num{font-family:var(--display);font-weight:800;font-size:36px;font-variant-numeric:tabular-nums;}
  .stat .lbl{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-top:4px;}
  .stat.green .num{color:var(--green);}
  .stat.yellow .num{color:#C79A17;}

  /* ---------- reports ---------- */
  #reports{display:flex;flex-direction:column;gap:16px;min-height:100%;padding-bottom:32px;}
  #reports .topbar h1{font-family:var(--display);font-size:26px;margin:0;}
  .tab-row{display:flex;gap:10px;}
  .tab{
    font-family:var(--display);font-weight:700;font-size:17px;
    padding:10px 22px;border-radius:999px;border:2px solid var(--line);background:#fff;color:var(--ink-soft);
  }
  .tab.selected{border-color:var(--navy);background:var(--navy);color:#fff;}
  .session-list{display:flex;flex-direction:column;gap:10px;}
  .session-row{
    background:var(--panel);border:1.5px solid var(--line);border-radius:14px;
    padding:14px 16px;
  }
  .session-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;width:100%;text-align:left;}
  .s-op{
    font-family:var(--display);font-weight:800;font-size:20px;width:38px;height:38px;
    border-radius:10px;background:var(--ice);display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }
  .s-main{flex:1;min-width:150px;}
  .s-title{font-weight:700;font-size:16px;}
  .s-date{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .s-stats{display:flex;gap:14px;align-items:center;font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
  .s-stats span{display:inline-flex;align-items:center;gap:5px;}
  .badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:.03em;}
  .badge.done{background:var(--green-soft);color:var(--green);}
  .badge.partial{background:var(--yellow-soft);color:#A57F0E;}
  .missed-list{margin-top:12px;padding-top:12px;border-top:1.5px solid var(--line);display:flex;flex-wrap:wrap;gap:8px;}
  .missed-chip{
    font-family:var(--display);font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;
    background:var(--yellow-soft);color:#7d600b;border-radius:9px;padding:6px 10px;
  }
  .missed-label{width:100%;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);}
  .empty-note{color:var(--ink-soft);text-align:center;padding:40px 0;font-size:16px;}
  .danger-zone{margin-top:auto;text-align:center;}
  .danger-zone button{font-size:13px;color:var(--ink-soft);text-decoration:underline;padding:10px;}

  /* geography mode */
  .geo{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}
  .geo-prompt{
    display:flex;align-items:center;gap:16px;
    background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);
    border-radius:18px;padding:12px 20px;color:#fff;
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.08);
  }
  #speakBtn{
    font-size:24px;width:52px;height:52px;border-radius:13px;
    background:rgba(255,255,255,.14);flex:0 0 auto;
  }
  #speakBtn:active{background:rgba(255,255,255,.3);}
  .geo-text{flex:1;min-width:0;}
  .geo-name{font-family:var(--display);font-weight:800;font-size:clamp(22px,3vw,34px);letter-spacing:-0.01em;}
  .geo-facts{font-size:15px;font-weight:600;color:rgba(255,255,255,.75);margin-top:2px;}
  .geo-facts b{color:var(--gold);font-weight:700;}
  .geo-status{font-family:var(--display);font-weight:700;font-size:16px;color:var(--gold);min-height:20px;margin-top:2px;}
  .geo-cards{display:flex;gap:10px;flex:0 0 auto;}
  .geo-bird{
    width:92px;height:92px;border-radius:14px;overflow:hidden;position:relative;
    border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);
  }
  .geo-bird img{width:100%;height:100%;object-fit:cover;display:block;}
  .geo-bird-fallback{position:absolute;inset:0;padding:6px 6px 14px;}
  .geo-bird-fallback svg{width:100%;height:100%;}
  .geo-flag{
    width:92px;height:92px;border-radius:14px;overflow:hidden;
    border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);
    display:flex;align-items:center;justify-content:center;
  }
  .geo-flag img{max-width:100%;max-height:100%;display:block;}
  .geo-bird-label{
    position:absolute;left:0;right:0;bottom:0;
    font-size:9px;font-weight:700;text-align:center;
    background:rgba(20,34,56,.75);color:#fff;padding:2px 3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .geo-map{
    flex:1;min-height:0;position:relative;
    background:var(--panel);border:1.5px solid var(--line);border-radius:var(--radius);
    overflow:hidden;
  }
  .geo-svg-wrap{position:absolute;inset:8px;}
  .geo-svg-wrap svg{width:100%;height:100%;display:block;touch-action:none;}
  .zoom-ctrl{
    position:absolute;right:12px;bottom:12px;
    display:flex;flex-direction:column;gap:8px;
  }
  .zbtn{
    width:48px;height:48px;border-radius:14px;
    font-family:var(--display);font-weight:800;font-size:24px;
    background:var(--panel);border:1.5px solid var(--line);color:var(--ink);
    box-shadow:0 2px 8px rgba(20,34,56,.12);
  }
  .zbtn:active{transform:scale(.94);background:#F3F7FB;}
  .region{fill:#C9D7E5;stroke:#fff;stroke-width:1.2;}
  .region.green{fill:var(--green);}
  .region.yellow{fill:var(--yellow);}
  .region.wrongflash{fill:#DD5F52;}
  .region.reveal{animation:revealPulse 1.5s ease;}
  @keyframes revealPulse{0%{fill:#C9D7E5;}40%{fill:var(--gold);}75%{fill:var(--gold);}100%{fill:#C9D7E5;}}

  /* portrait fallback: stack board under the card */
  @media (orientation:portrait){
    .main{flex-direction:column;}
    .board{align-items:center;}
  }
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<div id="home" class="screen">
  <div class="home-grid">
    <div class="home-card">
      <div class="section-label">Who's playing?</div>
      <div class="learner-row">
        <button class="learner-btn" data-learner="George">George</button>
        <button class="learner-btn" data-learner="Charlie">Charlie</button>
      </div>
    </div>

    <div class="home-card">
      <div class="section-label">Session setup</div>
      <div class="toggle-row op-grid" id="opRow">
        <button class="toggle-btn" data-op="add">+ Add</button>
        <button class="toggle-btn" data-op="sub">&minus; Subtract</button>
        <button class="toggle-btn selected" data-op="mult">&times; Multiply</button>
        <button class="toggle-btn" data-op="div">&divide; Divide</button>
        <button class="toggle-btn" data-op="usa">&#127482;&#127480; US States</button>
        <button class="toggle-btn" data-op="canada">&#127464;&#127462; Canada</button>
      </div>
      <div class="toggle-row" id="levelRow">
        <button class="toggle-btn selected" data-level="beginner">Beginner</button>
        <button class="toggle-btn" data-level="advanced">Advanced</button>
      </div>
      <div class="toggle-note" id="levelNote"></div>
    </div>
  </div>

  <div class="home-actions">
    <span id="homeWarn" class="chip hidden" style="color:#B4540A;border-color:#F0C8A8;align-self:center;"></span>
    <button class="btn btn-quiet" id="reportsBtn">Reports</button>
    <button class="btn hidden" id="resumeBtn"></button>
    <button class="btn btn-primary" id="startBtn">Start session</button>
  </div>
</div>

<!-- ============ SESSION ============ -->
<div id="session" class="screen hidden">
  <div class="topbar">
    <span class="brand" id="sLearner"></span>
    <span class="chip" id="sMode"></span>
    <span class="spacer"></span>
    <span class="chip" id="sProgress"></span>
    <span class="chip" id="sTimer">0:00</span>
    <button class="btn btn-quiet" id="endBtn">End session</button>
  </div>

  <div class="main">
    <div class="board" id="boardPanel">
      <div class="grid" id="grid"></div>
      <div class="legend">
        <span><span class="dot green"></span> Correct</span>
        <span><span class="dot yellow"></span> Coming back</span>
        <span><span class="dot pending"></span> To do</span>
      </div>
      <div class="board-count" id="boardCount"></div>
    </div>

    <div class="play" id="playPanel">
      <div class="card" id="card">
        <button id="clearWork" class="hidden">&#8634; clear work</button>
        <div class="prompt" id="prompt"></div>
        <div class="stack hidden" id="stack">
          <div class="st-row"><span id="stTop"></span></div>
          <div class="st-row st-bot"><span class="st-op" id="stOp"></span><span id="stBot"></span></div>
        </div>
        <div class="answer-slot" id="answerSlot">&nbsp;</div>
        <div class="status" id="cardStatus"></div>
        <div class="borrow-hint hidden" id="borrowHint">Press and hold a top digit to borrow from the left</div>
      </div>
      <div class="keypad">
        <button class="key" data-k="1">1</button>
        <button class="key" data-k="2">2</button>
        <button class="key" data-k="3">3</button>
        <button class="key" data-k="4">4</button>
        <button class="key" data-k="5">5</button>
        <button class="key" data-k="6">6</button>
        <button class="key" data-k="7">7</button>
        <button class="key" data-k="8">8</button>
        <button class="key" data-k="9">9</button>
        <button class="key back" data-k="back">&#9003;</button>

function factList(op, level){
  const facts = [];
  if(op === "mult"){
    const rows = level === "beginner" ? range(0,5) : range(0,12);
    for(const a of rows) for(const b of range(0,12))
      facts.push({ key:`m:${a}:${b}`, row:a, col:b, prompt:`${a} × ${b}`, answer:a*b });
  }else if(op === "div"){
    const rows = level === "beginner" ? range(1,5) : range(1,12);
    for(const d of rows) for(const q of range(0,12))
      facts.push({ key:`d:${d}:${q}`, row:d, col:q, prompt:`${d*q} ÷ ${d}`, answer:q });
  }else if(op === "add"){
    for(const a of range(0,10)) for(const b of range(0,10))
      facts.push({ key:`a:${a}:${b}`, row:a, col:b, prompt:`${a} + ${b}`, answer:a+b });
  }else{
    for(const r of range(0,10)) for(const c of range(0,10))
      facts.push({ key:`s:${r}:${c}`, row:r, col:c, prompt:`${r+c} − ${r}`, answer:c });
  }
  return facts;
}

/* advanced +/-: generated problem sets */
const ADV_COUNT = 30;
function randDigits(d){
  const min = d === 1 ? 0 : Math.pow(10, d-1);
  const max = Math.pow(10, d) - 1;
  return min + Math.floor(Math.random() * (max - min + 1));
}
function hasCarry(a,b){
  let c = 0;
  while(a > 0 || b > 0){
    const s = a%10 + b%10 + c;
    if(s > 9) return true;
    c = 0; a = Math.floor(a/10); b = Math.floor(b/10);
  }
  return false;
}
function hasBorrow(a,b){ /* assumes a >= b */
  let borrow = 0;
  while(b > 0 || borrow){
    const da = a%10 - borrow, db = b%10;
    if(da < db) return true;
    borrow = 0; a = Math.floor(a/10); b = Math.floor(b/10);
  }
  return false;
}
function genAdvanced(op){
  const facts = [];
  for(let i = 0; i < ADV_COUNT; i++){
    const aDigits = [2,3,4][i % 3];
    const wantHard = (i % 10) < 7; /* ~70% must carry/borrow */
    let a, b, tries = 0;
    do{
      a = randDigits(aDigits);
      b = randDigits(1 + Math.floor(Math.random() * aDigits));
      if(op === "sub" && b > a){ const t = a; a = b; b = t; }
      tries++;
    }while(tries < 40 && (op === "add" ? hasCarry(a,b) : hasBorrow(a,b)) !== wantHard);
    facts.push({
      key: "p:" + i, a, b, stack: true,
      prompt: a + " " + OPSYM[op] + " " + b,
      answer: op === "add" ? a + b : a - b
    });
  }
  return facts;
}

function genBeginner(op){
  const facts = [];
  const seen = {};
  for(let i = 0; i < ADV_COUNT; i++){
    let a, b, prompt, tries = 0;
    do{
      a = Math.floor(Math.random() * 21);
      b = Math.floor(Math.random() * 21);
      if(op === "sub" && b > a){ const t = a; a = b; b = t; }
      prompt = a + " " + OPSYM[op] + " " + b;
      tries++;
    }while(seen[prompt] && tries < 60);
    seen[prompt] = true;
    facts.push({
      key: "p:" + i, a, b,
      prompt,
      answer: op === "add" ? a + b : a - b
    });
  }
  return facts;
}

function buildFacts(op, level){
  if(isGeo(op))
    return GEO[op].regions.map(r => ({ key:"g:"+r.id, name:r.name, prompt:r.name, answer:r.id }));
  if(op === "add" || op === "sub")
    return level === "advanced" ? genAdvanced(op) : genBeginner(op);
  return factList(op, level);
}
function range(a,b){ const r=[]; for(let i=a;i<=b;i++) r.push(i); return r; }
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* =================== session engine =================== */
let session = null;      /* live session object */
let factIndex = {};      /* key -> fact for current session */
let entry = "";          /* current typed answer */
let attempt = 1;         /* 1 or 2 for current presentation */
let locked = false;      /* input locked during feedback */
let timerId = null;

function newSession(learner, op, level){
  const facts = buildFacts(op, level);
  return {
    id: Date.now() + "-" + Math.random().toString(36).slice(2,7),
    learner, op, level,
    facts, /* stored so generated problem sets survive resume */
    maxLen: Math.max(...facts.map(f => String(f.answer).length)),
    startedAt: Date.now(),
    lastActivity: Date.now(),
    elapsedMs: 0,
    queue: shuffle(facts.map(f=>f.key)),
    status: {},            /* key -> "green" | "yellow" */
    requeued: {},          /* key -> true if it has been requeued at least once */
    totalFacts: facts.length,
    completed: false
  };
}

function beginSession(sess){
  session = sess;
  factIndex = {};
  for(const f of (sess.facts || factList(sess.op, sess.level))) factIndex[f.key] = f;
  store.active[sess.learner] = sess;
  store.lastLearner = sess.learner;
  saveStore();
  const geo = isGeo(sess.op);
  document.getElementById("boardPanel").classList.toggle("hidden", geo);
  document.getElementById("playPanel").classList.toggle("hidden", geo);
  document.getElementById("geo").classList.toggle("hidden", !geo);
  if(geo) renderGeoMap(); else buildGrid();
  showScreen("session");
  document.getElementById("sLearner").textContent = sess.learner;
  document.getElementById("sMode").textContent = geo
    ? OPSYM[sess.op] + " " + OPNAME[sess.op]
    : OPSYM[sess.op] + " " + OPNAME[sess.op] + " · " +
      (sess.level==="beginner" ? "Beginner" : "Advanced");
  session.lastActivity = Date.now();
  startTimer();
  nextCard();
}

function tickTime(){
  const now = Date.now();
  session.elapsedMs += Math.min(now - session.lastActivity, IDLE_CAP_MS);
  session.lastActivity = now;
}

function currentKey(){ return session.queue[0]; }

function nextCard(){
  updateHud();
  updateGoKey();
  if(session.queue.length === 0){ finalize(true); return; }
  const f = factIndex[currentKey()];
  entry = ""; attempt = 1; locked = false;
  if(isGeo(session.op)){
    colBoxes = null;
    carryMarks = null;
    pendingCarry = null;
    document.getElementById("geoName").textContent = f.name;
    const info = GEOINFO[f.answer] || {};
    document.getElementById("geoFacts").innerHTML =
      (info.cap ? 'Capital: <b>' + info.cap + '</b>' : '') +
      (info.bird ? ' &nbsp;·&nbsp; Bird: <b>' + info.bird + '</b>' : '');
    showFlag(f.answer);
    showBird(f.answer, info.bird || "");
    setGeoStatus("");
    speak(f.name);
    return;
  }
  const card = document.getElementById("card");
  const stacked = !!f.stack;
  card.classList.toggle("stacked", stacked);
  document.getElementById("prompt").classList.toggle("hidden", stacked);
  document.getElementById("stack").classList.toggle("hidden", !stacked);
  if(stacked){
    const isSub = session.op === "sub";
    card.classList.add("colmode");
    document.getElementById("stOp").textContent = OPSYM[session.op];
    document.getElementById("stBot").innerHTML =
      '<span class="dgrp">' +
      String(f.b).split("").map(d => '<span class="dcell">' + d + '</span>').join("") +
      '</span>';
    if(isSub){
      buildBorrowRow(f.a);
      renderBorrow();
      carryMarks = null; pendingCarry = null;
      colBoxes = new Array(String(f.a).length).fill("");
      document.getElementById("borrowHint").textContent = "Press and hold the digit you borrow from";
    }else{
      buildCarryRow(f.a);
      renderCarry();
      borrowCols = null; pendingBorrow = null;
      /* one extra box on the left for a final carry-out */
      colBoxes = new Array(String(f.a).length + 1).fill("");
      document.getElementById("borrowHint").textContent = "Press and hold a top digit to write a carry";
    }
    buildAnsBoxes(colBoxes.length);
    document.getElementById("borrowHint").classList.remove("hidden");
  }else{
    card.classList.remove("colmode");
    borrowCols = null;
    pendingBorrow = null;
    carryMarks = null;
    pendingCarry = null;
    colBoxes = null;
    document.getElementById("borrowHint").classList.add("hidden");
    document.getElementById("clearWork").classList.add("hidden");
    document.getElementById("prompt").textContent = f.prompt + " =";
  }
  renderEntry();
  setStatusMsg("");
  card.classList.remove("correct","shake");
  highlightCurrent(f.key);
}

let colBoxes = null; /* per-column answer digits, filled right to left by default */
let boxManual = false; /* true once the kid taps a box to take control of the cursor */
let boxCursor = 0;

function activeBoxIndex(){
  if(!colBoxes) return -1;
  return boxManual ? boxCursor : colBoxes.lastIndexOf("");
}

function buildAnsBoxes(n){
  const slot = document.getElementById("answerSlot");
  slot.innerHTML = "";
  boxManual = false;
  for(let i = 0; i < n; i++){
    const b = document.createElement("span");
    b.className = "abox";
    b.addEventListener("click", ()=>{
      if(locked || !colBoxes) return;
      if(pendingBorrow){ setStatusMsg("Finish writing the borrow you started"); return; }
      if(pendingCarry !== null){ setStatusMsg("Finish writing the carry you started"); return; }
      boxManual = true;
      boxCursor = i;
      renderEntry();
    });
    slot.appendChild(b);
  }
}

function renderEntry(){
  if(colBoxes){
    const active = activeBoxIndex();
    const boxes = document.querySelectorAll("#answerSlot .abox");
    boxes.forEach((b, i)=>{
      b.textContent = colBoxes[i];
      b.classList.toggle("active", i === active);
    });
    const cols = document.querySelectorAll("#stTop .bcol");
    const offset = boxes.length - cols.length; /* 1 in addition (carry-out box), 0 in subtraction */
    cols.forEach((c, i)=>{
      c.classList.toggle("colactive", i === active - offset);
    });
    return;
  }
  document.getElementById("answerSlot").innerHTML = entry === "" ? "&nbsp;" : entry;
}
function setStatusMsg(t){ document.getElementById("cardStatus").textContent = t; }

function press(k){
  if(locked || !session || isGeo(session.op)) return;
  if(pendingBorrow){ scratchKey(k); return; }
  if(pendingCarry !== null){ carryKey(k); return; }
  if(colBoxes){
    if(k === "enter"){ submit(); return; }
    if(k === "back"){
      if(boxManual){
        if(colBoxes[boxCursor] !== ""){
          colBoxes[boxCursor] = "";
        }else if(boxCursor > 0){
          boxCursor--;
          colBoxes[boxCursor] = "";
        }
        renderEntry();
        return;
      }
      const re = colBoxes.lastIndexOf("");
      const t = re === -1 ? 0 : re + 1;
      if(t < colBoxes.length) colBoxes[t] = "";
      renderEntry();
      return;
    }
    if(boxManual){
      colBoxes[boxCursor] = k;
      if(boxCursor < colBoxes.length - 1) boxCursor++;
      else boxManual = false; /* past the rightmost box, fall back to auto */
      renderEntry();
      return;
    }
    const re = colBoxes.lastIndexOf("");
    if(re >= 0){ colBoxes[re] = k; renderEntry(); }
    return;
  }
  if(k === "back"){ entry = entry.slice(0,-1); renderEntry(); return; }
  if(k === "enter"){ submit(); return; }
  if(entry.length < (session.maxLen || 3)){ entry += k; renderEntry(); }
}

function submit(){
  if(locked) return;
  const f = factIndex[currentKey()];
  const card = document.getElementById("card");
  let given;
  if(colBoxes){
    const optionalLead = session.op === "add" ? 1 : 0;
    if(colBoxes.some((d, i) => d === "" && i >= optionalLead)){
      card.classList.add("shake");
      setTimeout(()=>card.classList.remove("shake"), 420);
      setStatusMsg("Every column gets a digit — zeros count");
      return;
    }
    given = parseInt(colBoxes.join(""), 10);
  }else{
    if(entry === "") return;
    given = parseInt(entry, 10);
  }
  const correct = given === f.answer;
  tickTime();
  locked = true;

  if(correct){
    /* a correct answer always earns green, even after earlier misses */
    session.status[f.key] = "green";
    session.queue.shift();
    saveStore();
    paintCell(f.key);
    card.classList.add("correct");
    playDing();
    setStatusMsg("Nice!");
    setTimeout(nextCard, 550);
  }else if(attempt === 1){
    attempt = 2;
    session.status[f.key] = "yellow";
    session.everMissed = session.everMissed || {};
    session.everMissed[f.key] = true;
    saveStore();
    paintCell(f.key);
    card.classList.add("shake");
    playThunk();
    setStatusMsg("Try again");
    setTimeout(()=>{
      card.classList.remove("shake");
      entry = "";
      if(colBoxes){ colBoxes.fill(""); boxManual = false; }
      renderEntry();
      locked = false;
    }, 420);
  }else{
    /* second miss: reveal, requeue further back */
    session.status[f.key] = "yellow";
    session.everMissed = session.everMissed || {};
    session.everMissed[f.key] = true;
    session.requeued[f.key] = true;
    session.queue.shift();
    const pos = Math.min(4 + Math.floor(Math.random()*3), session.queue.length);
    session.queue.splice(pos, 0, f.key);
    saveStore();
    paintCell(f.key);
    card.classList.add("shake");
    playThunk();
    setStatusMsg(f.prompt + " = " + f.answer + " — it'll come back");
    setTimeout(()=>{ card.classList.remove("shake"); nextCard(); }, 1600);
  }
}

function finalize(completed){
  stopTimer();
  tickTime();
  session.completed = completed;
  const facts = Object.keys(factIndex);
  const missedMap = session.everMissed || {};
  const yellows = facts.filter(k=>missedMap[k] || session.status[k]==="yellow");
  const greens = facts.filter(k=>session.status[k]==="green" && yellows.indexOf(k)===-1);
  const rec = {
    id: session.id,
    learner: session.learner,
    op: session.op,
    level: session.level,
    startedAt: session.startedAt,
    endedAt: Date.now(),
    durationSec: Math.round(session.elapsedMs/1000),
    completed,
    totalFacts: session.totalFacts,
    greenCount: greens.length,
    yellowCount: yellows.length,
    unansweredCount: session.totalFacts - greens.length - yellows.length,
    missed: yellows.map(k=>factIndex[k].prompt).sort()
  };
  store.sessions.unshift(rec);
  delete store.active[session.learner];
  saveStore();
  const s = session;
  session = null;
  document.getElementById("doneTitle").textContent = completed
    ? s.learner + " cleared the board!"
    : "Session saved — " + rec.unansweredCount + " to go";
  document.getElementById("doneGreen").textContent = rec.greenCount;
  document.getElementById("doneYellow").textContent = rec.yellowCount;
  document.getElementById("doneTime").textContent = fmtTime(rec.durationSec);
  showScreen("done");
}

/* archive an unfinished session that was abandoned (e.g. new one started over it) */
function archiveAbandoned(learner){
  const s = store.active[learner];
  if(!s) return;
  const facts = s.facts || factList(s.op, s.level);
  const idx = {}; for(const f of facts) idx[f.key]=f;
  const keys = Object.keys(idx);
  const missedMap = s.everMissed || {};
  const yellows = keys.filter(k=>missedMap[k] || s.status[k]==="yellow");
  const greens = keys.filter(k=>s.status[k]==="green" && yellows.indexOf(k)===-1);
  store.sessions.unshift({
    id: s.id, learner: s.learner, op: s.op, level: s.level,
    startedAt: s.startedAt, endedAt: Date.now(),
    durationSec: Math.round(s.elapsedMs/1000),
    completed: false, totalFacts: s.totalFacts,
    greenCount: greens.length, yellowCount: yellows.length,
    unansweredCount: s.totalFacts - greens.length - yellows.length,
    missed: yellows.map(k=>idx[k].prompt).sort()
  });
  delete store.active[learner];
  saveStore();
}

/* =================== borrowing scratchpad (advanced subtraction) =================== */
let borrowCols = null;
let pendingBorrow = null; /* {lender, receiver, stage:"lender"|"receiver", entry} */

function buildBorrowRow(a){
  const top = document.getElementById("stTop");
  top.innerHTML = "";
  borrowCols = String(a).split("").map(d => ({ orig:+d, plus10:false, lent:false, hist:[] }));
  pendingBorrow = null;
  borrowCols.forEach((c, i) => {
    const col = document.createElement("span");
    col.className = "bcol";
    col.innerHTML = '<span class="scratch"></span><span class="borig">' + c.orig + '</span>';
    attachHold(col, () => borrowInto(i));
    top.appendChild(col);
  });
}
function colValue(c){ return c.orig + (c.plus10 ? 10 : 0) - (c.lent ? 1 : 0); }

function updateGoKey(){
  const go = document.querySelector(".key.enter");
  const borrowing = !!pendingBorrow;
  go.textContent = borrowing ? "Done" : "Go";
  go.classList.toggle("borrowing", borrowing);
}

function renderBorrow(){
  const cols = document.querySelectorAll("#stTop .bcol");
  cols.forEach((col, i) => {
    const c = borrowCols[i];
    col.classList.toggle("bmod", c.plus10 || c.lent);
    const sc = col.querySelector(".scratch");
    sc.classList.remove("active","waiting");
    const pendingHere = pendingBorrow &&
      i === (pendingBorrow.stage==="lender" ? pendingBorrow.lender : pendingBorrow.receiver);
    const waitingHere = pendingBorrow && pendingBorrow.stage==="lender" && i === pendingBorrow.receiver;
    let html = "";
    if(pendingHere) html += '<span class="sv active">' + pendingBorrow.entry + '</span>';
    else if(waitingHere) html += '<span class="sv waiting">_</span>';
    const hist = c.hist || [];
    for(let k = hist.length - 1; k >= 0; k--){
      /* struck if a newer value sits above it (or one is being written now) */
      const struck = k < hist.length - 1 || pendingHere;
      html += '<span class="sv' + (struck ? " old" : "") + '">' + hist[k] + '</span>';
    }
    sc.innerHTML = html;
  });
  const any = pendingBorrow || (borrowCols && borrowCols.some(c => c.plus10 || c.lent));
  document.getElementById("clearWork").classList.toggle("hidden", !any);
  updateGoKey();
}

function borrowInto(i){ /* i = the digit being held: the LENDER */
  if(locked || !borrowCols) return;
  if(pendingBorrow){
    colShake(pendingBorrow.stage==="lender" ? pendingBorrow.lender : pendingBorrow.receiver);
    setStatusMsg("Finish writing the borrow you started");
    return;
  }
  const L = borrowCols[i];
  if(i === borrowCols.length - 1){ colShake(i); setStatusMsg("The ones digit has no column to its right to lend to"); return; }
  const c = borrowCols[i+1]; /* receiver = right neighbor */
  if(L.lent){ colShake(i); setStatusMsg("That digit already lent its 1"); return; }
  if(colValue(L) <= 0){ colShake(i); setStatusMsg("That 0 has nothing to lend — it needs to borrow first"); return; }
  if(c.plus10){ colShake(i+1); setStatusMsg("The column to its right already borrowed"); return; }
  L.lent = true;
  c.plus10 = true;
  pendingBorrow = { lender:i, receiver:i+1, stage:"lender", entry:"", misses:0 };
  renderBorrow();
  setStatusMsg("Write the crossed-out digit's new value");
}

function scratchKey(k){
  const p = pendingBorrow;
  if(k === "back"){
    if(p.entry !== ""){ p.entry = p.entry.slice(0,-1); renderBorrow(); return; }
    /* empty slot + backspace: cancel the whole borrow */
    if(p.stage === "receiver") borrowCols[p.lender].hist.pop();
    borrowCols[p.lender].lent = false;
    borrowCols[p.receiver].plus10 = false;
    pendingBorrow = null;
    renderBorrow();
    setStatusMsg("Borrow cancelled");
    return;
  }
  if(k === "enter"){ confirmScratch(); return; }
  if(p.entry.length < 2){ p.entry += k; renderBorrow(); }
}

function confirmScratch(){
  const p = pendingBorrow;
  if(p.entry === "") return;
  const idx = p.stage === "lender" ? p.lender : p.receiver;
  const expected = colValue(borrowCols[idx]);
  if(parseInt(p.entry, 10) === expected){
    borrowCols[idx].hist.push(expected);
    if(p.stage === "lender"){
      p.stage = "receiver"; p.entry = ""; p.misses = 0;
      playDing();
      popCol(p.lender);
      setStatusMsg("Now write this column's new value");
    }else{
      const r = p.receiver;
      pendingBorrow = null;
      playDing();
      popCol(r);
      setStatusMsg("");
    }
    renderBorrow();
  }else{
    colShake(idx);
    playThunk();
    p.entry = "";
    p.misses = (p.misses || 0) + 1;
    renderBorrow();
    if(p.misses >= 2){
      setStatusMsg(p.stage === "lender"
        ? "It just lent 1 to its neighbor — what's left?"
        : "It just took 10 from its neighbor — what is it now?");
    }else{
      setStatusMsg("Not quite — try again");
    }
  }
}

function colShake(i){
  const col = document.querySelectorAll("#stTop .bcol")[i];
  if(!col) return;
  col.classList.add("colshake");
  setTimeout(()=>col.classList.remove("colshake"), 400);
}
function popCol(i){
  const col = document.querySelectorAll("#stTop .bcol")[i];
  if(!col) return;
  col.classList.add("pop");
  setTimeout(()=>col.classList.remove("pop"), 300);
}

function attachHold(el, fn){
  let t = null, fired = false;
  el.addEventListener("pointerdown", e => {
    e.preventDefault();
    fired = false;
    el.classList.add("holding");
    t = setTimeout(()=>{ fired = true; t = null; el.classList.remove("holding"); fn(); }, 400);
  });
  const cancel = () => {
    el.classList.remove("holding");
    if(t){ clearTimeout(t); t = null; }
  };
  el.addEventListener("pointerup", () => {
    const quickTap = t && !fired;
    cancel();
    if(quickTap) setStatusMsg("Hold a top digit to borrow");
  });
  el.addEventListener("pointercancel", cancel);
  el.addEventListener("pointerleave", cancel);
}

document.getElementById("clearWork").addEventListener("click", ()=>{
  if(borrowCols){
    borrowCols.forEach(c => { c.plus10 = false; c.lent = false; c.hist = []; });
    pendingBorrow = null;
    renderBorrow();
  }
  if(carryMarks){
    carryMarks = carryMarks.map(()=>false);
    pendingCarry = null;
    renderCarry();
  }
  setStatusMsg("");
});

/* =================== carrying scratchpad (advanced addition) =================== */
let carryMarks = null;
let pendingCarry = null; /* column index awaiting the carry digit */

function buildCarryRow(a){
  const top = document.getElementById("stTop");
  top.innerHTML = "";
  const digits = String(a).split("");
  carryMarks = digits.map(()=>false);
  pendingCarry = null;
  digits.forEach((d, i)=>{
    const col = document.createElement("span");
    col.className = "bcol";
    col.innerHTML = '<span class="scratch"></span><span class="borig">' + d + '</span>';
    attachHold(col, () => carryInto(i));
    top.appendChild(col);
  });
}

function renderCarry(){
  document.querySelectorAll("#stTop .bcol").forEach((col, i)=>{
    const sc = col.querySelector(".scratch");
    sc.classList.remove("active","waiting");
    if(pendingCarry === i){
      sc.textContent = "";
      sc.classList.add("active");
    }else{
      sc.textContent = carryMarks[i] ? "1" : "";
    }
  });
  document.getElementById("clearWork").classList.toggle("hidden",
    pendingCarry === null && !carryMarks.some(x=>x));
}

function carryInto(i){
  if(locked || !carryMarks) return;
  if(pendingCarry !== null){
    colShake(pendingCarry);
    setStatusMsg("Finish writing the carry you started");
    return;
  }
  if(i === carryMarks.length - 1){ colShake(i); setStatusMsg("The ones column never gets a carry"); return; }
  if(carryMarks[i]){ colShake(i); setStatusMsg("Already carried there"); return; }
  pendingCarry = i;
  renderCarry();
  setStatusMsg("Write the carry above this column");
}

function carryKey(k){
  if(k === "back"){ pendingCarry = null; renderCarry(); setStatusMsg(""); return; }
  if(k === "enter") return;
  if(parseInt(k, 10) === 1){
    const i = pendingCarry;
    carryMarks[i] = true;
    pendingCarry = null;
    playDing();
    renderCarry();
    popCol(i);
    setStatusMsg("");
  }else{
    colShake(pendingCarry);
    playThunk();
    setStatusMsg("Not quite — try again");
  }
}

function birdSVG(id){
  const sp = SPECIES[BIRD_SPECIES[id]];
  if(!sp) return "";
  const s = [];
  const add = t => s.push(t);
  if(sp.owl){
    const bars = sp.bars || null;
    add('<ellipse cx="60" cy="76" rx="27" ry="26" fill="'+sp.back+'"/>');
    if(bars) for(let y=62;y<=92;y+=8) add('<rect x="40" y="'+y+'" width="40" height="3" rx="1.5" fill="'+bars+'" opacity=".7"/>');
    if(sp.tufts){
      add('<polygon points="38,26 45,6 52,28" fill="'+sp.back+'"/>');
      add('<polygon points="68,28 75,6 82,26" fill="'+sp.back+'"/>');
    }
    add('<circle cx="60" cy="40" r="25" fill="'+sp.back+'"/>');
    add('<circle cx="50" cy="40" r="11.5" fill="'+sp.disk+'"/>');
    add('<circle cx="70" cy="40" r="11.5" fill="'+sp.disk+'"/>');
    if(sp.rings){
      add('<circle cx="50" cy="40" r="11.5" fill="none" stroke="'+sp.back+'" stroke-width="2"/>');
      add('<circle cx="50" cy="40" r="6.5" fill="none" stroke="'+sp.back+'" stroke-width="1.5"/>');
      add('<circle cx="70" cy="40" r="11.5" fill="none" stroke="'+sp.back+'" stroke-width="2"/>');
      add('<circle cx="70" cy="40" r="6.5" fill="none" stroke="'+sp.back+'" stroke-width="1.5"/>');
    }
    add('<circle cx="50" cy="40" r="5" fill="'+sp.eyeC+'"/><circle cx="50" cy="40" r="2.4" fill="#1C1C22"/>');
    add('<circle cx="70" cy="40" r="5" fill="'+sp.eyeC+'"/><circle cx="70" cy="40" r="2.4" fill="#1C1C22"/>');
    add('<polygon points="56,46 64,46 60,55" fill="#4A4A46"/>');
    add('<line x1="52" y1="101" x2="52" y2="110" stroke="#6B6B60" stroke-width="3"/>');
    add('<line x1="68" y1="101" x2="68" y2="110" stroke="#6B6B60" stroke-width="3"/>');
    return '<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">'+s.join("")+'</svg>';
  }
  const plump = sp.plump || 1;
  const bs = sp.bs || 1;
  const tail = sp.tail == null ? 34 : sp.tail;
  const tailC = sp.tailC || sp.back;
  const headC = sp.headC || sp.back;
  const wingC = sp.wing || shade(sp.back);
  const legsC = sp.legsC || "#6B6B60";
  const legLen = sp.legs === "long" ? 20 : 12;
  /* tail */
  if(sp.forked){
    add('<polygon points="80,58 '+(80+tail)+',44 '+(78+tail)+',52 84,62" fill="'+tailC+'"/>');
    add('<polygon points="80,64 '+(80+tail)+',80 '+(78+tail)+',72 84,62" fill="'+tailC+'"/>');
  }else{
    add('<polygon points="78,54 '+(80+tail)+',58 '+(78+tail)+',68 76,66" fill="'+tailC+'"/>');
  }
  /* legs */
  add('<line x1="52" y1="86" x2="50" y2="'+(88+legLen)+'" stroke="'+legsC+'" stroke-width="3"/>');
  add('<line x1="64" y1="86" x2="64" y2="'+(88+legLen)+'" stroke="'+legsC+'" stroke-width="3"/>');
  /* body: belly under, back shell over top */
  add('<ellipse cx="58" cy="66" rx="'+(29*plump)+'" ry="'+(22*plump)+'" fill="'+sp.belly+'"/>');
  add('<path d="M'+(58-29*plump)+',64 A'+(29*plump)+','+(22*plump)+' 0 0 1 '+(58+29*plump)+',64 L'+(58+20)+',58 Q58,40 '+(58-24)+',56 Z" fill="'+sp.back+'"/>');
  /* wing */
  add('<ellipse cx="64" cy="62" rx="17" ry="11" transform="rotate(-18 64 62)" fill="'+wingC+'"/>');
  if(sp.wingPatch) add('<ellipse cx="66" cy="62" rx="8" ry="4.5" transform="rotate(-18 66 62)" fill="'+sp.wingPatch+'"/>');
  if(sp.checks) for(let i=0;i<6;i++) add('<rect x="'+(52+(i%3)*10)+'" y="'+(54+Math.floor(i/3)*9)+'" width="5" height="5" fill="#FFFFFF"/>');
  /* marks on breast */
  if(sp.mark === "v") add('<path d="M44,64 L52,76 L60,64" fill="none" stroke="'+sp.markC+'" stroke-width="5" stroke-linecap="round"/>');
  if(sp.mark === "spots") for(let i=0;i<5;i++) add('<circle cx="'+(42+(i%3)*8)+'" cy="'+(66+Math.floor(i/3)*8)+'" r="2.4" fill="'+sp.markC+'"/>');
  if(sp.mark === "streaks") for(let i=0;i<4;i++) add('<line x1="'+(42+i*7)+'" y1="62" x2="'+(44+i*7)+'" y2="74" stroke="'+sp.markC+'" stroke-width="2.5"/>');
  /* neck ring (pheasant) */
  if(sp.ring) add('<path d="M22,52 Q34,60 46,54" fill="none" stroke="'+sp.ring+'" stroke-width="4"/>');
  /* head */
  add('<circle cx="30" cy="40" r="15" fill="'+headC+'"/>');
  if(sp.cap) add('<path d="M15,38 A15,15 0 0 1 45,38 L15,38 Z" fill="'+sp.cap+'"/>');
  if(sp.cheek) add('<circle cx="26" cy="45" r="7" fill="'+sp.cheek+'"/>');
  if(sp.mask) add('<path d="M17,34 Q29,29 40,35 L38,45 Q27,47 17,44 Z" fill="'+sp.mask+'"/>');
  if(sp.bib) add('<polygon points="24,52 42,50 38,66 27,64" fill="'+sp.bib+'"/>');
  if(sp.stripe) add('<line x1="19" y1="33" x2="42" y2="31" stroke="'+sp.stripe+'" stroke-width="3" stroke-linecap="round"/>');
  if(sp.nape) add('<circle cx="42" cy="31" r="4" fill="'+sp.nape+'"/>');
  /* crest */
  if(sp.crest === "point") add('<polygon points="26,28 36,8 42,28" fill="'+sp.crestC+'"/>');
  if(sp.crest === "comb"){
    add('<circle cx="24" cy="26" r="4.5" fill="'+sp.crestC+'"/>');
    add('<circle cx="31" cy="23" r="4.5" fill="'+sp.crestC+'"/>');
    add('<circle cx="38" cy="26" r="4.5" fill="'+sp.crestC+'"/>');
  }
  if(sp.crest === "plume"){
    add('<path d="M28,27 Q26,16 19,13" fill="none" stroke="'+sp.crestC+'" stroke-width="3"/>');
    add('<circle cx="17" cy="12" r="5" fill="'+sp.crestC+'"/>');
  }
  /* beak */
  const B = 40 + 8*(bs-1);
  if(sp.beakT === "cone") add('<polygon points="17,'+(B-5)+' '+(17-14*bs)+','+B+' 17,'+(B+5)+'" fill="'+sp.beak+'"/>');
  if(sp.beakT === "long") add('<polygon points="17,'+(B-4)+' '+(17-22*bs)+','+(B+1)+' 17,'+(B+4)+'" fill="'+sp.beak+'"/>');
  if(sp.beakT === "hook") add('<path d="M17,35 L3,39 Q0,41 5,45 L11,46 L17,47 Z" fill="'+sp.beak+'"/>');
  if(sp.beakT === "pelican"){
    add('<polygon points="20,36 -10,42 20,54" fill="'+sp.beak+'"/>');
    add('<line x1="20" y1="42" x2="-8" y2="43" stroke="#C97A1E" stroke-width="2"/>');
  }
  if(sp.beakT === "puffin"){
    add('<polygon points="19,31 -6,42 19,53" fill="'+sp.beak+'"/>');
    add('<polygon points="19,31 4,38 19,38" fill="#F2C230"/>');
    add('<polygon points="1,39 -6,42 1,45" fill="#C0392B"/>');
  }
  /* eye */
  const eyeC = sp.eyeC || "#1C1C22";
  add('<circle cx="33" cy="37" r="3.6" fill="'+eyeC+'"/>');
  if(sp.eyeGlint) add('<circle cx="34" cy="36" r="1.2" fill="#FFFFFF"/>');
  else if(sp.eyeC) add('<circle cx="33" cy="37" r="1.6" fill="#1C1C22"/>');
  return '<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">'+s.join("")+'</svg>';
}
function shade(hex){
  const n = parseInt(hex.slice(1), 16);
  const f = c => Math.max(0, Math.floor(c*0.72));
  return "#" + ((f(n>>16&255)<<16) | (f(n>>8&255)<<8) | f(n&255)).toString(16).padStart(6,"0");
}

function showBird(id, birdName){
  const card = document.getElementById("geoBird");
  const img = document.getElementById("geoBirdImg");
  const fallback = document.getElementById("geoBirdFallback");
  document.getElementById("geoBirdLabel").textContent = birdName;
  card.classList.remove("hidden");
  /* illustration shows immediately; a real photo replaces it if it loads */
  fallback.innerHTML = birdSVG(id);
  fallback.classList.remove("hidden");
  img.classList.add("hidden");
  img.onload = ()=>{ img.classList.remove("hidden"); fallback.classList.add("hidden"); };
  img.onerror = ()=>{ img.classList.add("hidden"); fallback.classList.remove("hidden"); };
  img.src = "birds/" + id + ".jpg";
}

function showFlag(id){
  const card = document.getElementById("geoFlag");
  const img = document.getElementById("geoFlagImg");
  card.classList.add("hidden");
  img.onload = ()=>card.classList.remove("hidden");
  img.onerror = ()=>card.classList.add("hidden");
  img.src = "flags/" + id + ".png";
}

/* =================== sounds (synthesized, fully offline) =================== */
let audioCtx = null;
function ac(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }catch(e){ return null; }
}
function playDing(){
  const c = ac(); if(!c) return;
  [[880, 0, .16, .16], [1318.5, .07, .22, .12]].forEach(([f, t0, dur, vol])=>{
    const o = c.createOscillator(), g = c.createGain();
    o.type = "sine"; o.frequency.value = f;
    g.gain.setValueAtTime(vol, c.currentTime + t0);
    g.gain.exponentialRampToValueAtTime(.0001, c.currentTime + t0 + dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime + t0); o.stop(c.currentTime + t0 + dur + .02);
  });
}
function playThunk(){
  const c = ac(); if(!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(160, c.currentTime);
  o.frequency.exponentialRampToValueAtTime(70, c.currentTime + .12);
  g.gain.setValueAtTime(.3, c.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001, c.currentTime + .14);
  o.connect(g); g.connect(c.destination);
  o.start(); o.stop(c.currentTime + .16);
}

function speak(text){
  try{
    if(!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}
function setGeoStatus(t){ document.getElementById("geoStatus").textContent = t; }

let geoSvg = null, geoBase = null, geoView = null;
let geoDidPan = false;

function setGeoViewBox(){
  geoView.w = Math.min(Math.max(geoView.w, geoBase.w / 8), geoBase.w);
  geoView.h = geoView.w * geoBase.h / geoBase.w;
  geoView.x = Math.min(Math.max(geoView.x, geoBase.x), geoBase.x + geoBase.w - geoView.w);
  geoView.y = Math.min(Math.max(geoView.y, geoBase.y), geoBase.y + geoBase.h - geoView.h);
  geoSvg.setAttribute("viewBox", geoView.x + " " + geoView.y + " " + geoView.w + " " + geoView.h);
}
function geoSvgPt(cx, cy){
  const p = geoSvg.createSVGPoint();
  p.x = cx; p.y = cy;
  return p.matrixTransform(geoSvg.getScreenCTM().inverse());
}
function geoZoom(f, cx, cy){ /* f>1 zooms in; client coords, or center if omitted */
  if(!geoSvg) return;
  const P = (cx == null)
    ? { x: geoView.x + geoView.w/2, y: geoView.y + geoView.h/2 }
    : geoSvgPt(cx, cy);
  const clampedW = Math.min(Math.max(geoView.w / f, geoBase.w / 8), geoBase.w);
  const realF = geoView.w / clampedW;
  geoView.x = P.x - (P.x - geoView.x) / realF;
  geoView.y = P.y - (P.y - geoView.y) / realF;
  geoView.w = clampedW;
  setGeoViewBox();
}
function geoResetZoom(){
  if(!geoSvg) return;
  geoView = { x:geoBase.x, y:geoBase.y, w:geoBase.w, h:geoBase.h };
  setGeoViewBox();
}

function renderGeoMap(){
  const m = GEO[session.op];
  const wrap = document.getElementById("geoSvgWrap");
  wrap.innerHTML = "";
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  const nums = m.viewBox.split(" ").map(Number);
  geoBase = { x:nums[0], y:nums[1], w:nums[2], h:nums[3] };
  geoView = { x:nums[0], y:nums[1], w:nums[2], h:nums[3] };
  geoSvg = svg;
  geoDidPan = false;
  svg.setAttribute("viewBox", m.viewBox);
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
  for(const r of m.regions){
    const p = document.createElementNS(NS, "path");
    p.setAttribute("d", r.path);
    p.setAttribute("class", "region");
    p.id = "cell-g_" + r.id;
    p.dataset.id = r.id;
    p.dataset.name = r.name;
    const st = session.status["g:" + r.id];
    if(st) p.classList.add(st);
    svg.appendChild(p);
  }
  /* pinch to zoom, drag to pan, tap to answer.
     Taps are detected on pointerup from the pointerdown target because
     setPointerCapture retargets click events to the svg root. */
  const pointers = new Map();
  let lastDist = null, lastMid = null, panActive = false;
  svg.addEventListener("pointerdown", e => {
    clearTimeout(geoRestoreTimer);
    svg.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, {
      x:e.clientX, y:e.clientY, sx:e.clientX, sy:e.clientY, target:e.target
    });
    if(pointers.size === 2){
      const pts = [...pointers.values()];
      lastDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
      lastMid = { x:(pts[0].x + pts[1].x)/2, y:(pts[0].y + pts[1].y)/2 };
    }
  });
  svg.addEventListener("pointermove", e => {
    if(!pointers.has(e.pointerId)) return;
    const P = pointers.get(e.pointerId);
    const prev = { x:P.x, y:P.y };
    P.x = e.clientX; P.y = e.clientY;
    if(pointers.size === 2){
      e.preventDefault();
      const pts = [...pointers.values()];
      const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
      const mid = { x:(pts[0].x + pts[1].x)/2, y:(pts[0].y + pts[1].y)/2 };
      if(lastDist){
        const m1 = geoSvgPt(lastMid.x, lastMid.y);
        geoZoom(dist / lastDist, mid.x, mid.y);
        const m2 = geoSvgPt(mid.x, mid.y);
        geoView.x += m1.x - m2.x;
        geoView.y += m1.y - m2.y;
        setGeoViewBox();
      }
      lastDist = dist; lastMid = mid;
      geoDidPan = true;
    }else if(pointers.size === 1){
      const total = Math.abs(P.x - P.sx) + Math.abs(P.y - P.sy);
      const zoomed = geoView.w < geoBase.w - 0.5;
      if((panActive || total > 8) && zoomed){
        e.preventDefault();
        panActive = true;
        const p1 = geoSvgPt(prev.x, prev.y);
        const p2 = geoSvgPt(P.x, P.y);
        geoView.x += p1.x - p2.x;
        geoView.y += p1.y - p2.y;
        setGeoViewBox();
        geoDidPan = true;
      }
    }
  });
  const endPtr = e => {
    pointers.delete(e.pointerId);
    if(pointers.size < 2){ lastDist = null; lastMid = null; }
    if(pointers.size === 0){
      panActive = false;
      setTimeout(()=>{ geoDidPan = false; }, 60);
    }
  };
  svg.addEventListener("pointerup", e => {
    const P = pointers.get(e.pointerId);
    if(P && pointers.size === 1 && !panActive && !geoDidPan){
      const moved = Math.abs(e.clientX - P.sx) + Math.abs(e.clientY - P.sy);
      const t = P.target;
      if(moved <= 10 && t && t.dataset && t.dataset.id)
        tapRegion(t.dataset.id, t.dataset.name);
    }
    endPtr(e);
  });
  svg.addEventListener("pointercancel", endPtr);

  wrap.appendChild(svg);
}

document.getElementById("zoomInBtn").addEventListener("click", ()=>geoZoom(1.6));
document.getElementById("zoomOutBtn").addEventListener("click", ()=>geoZoom(1/1.6));
document.getElementById("zoomResetBtn").addEventListener("click", geoResetZoom);

function flashRegion(id){
  const el = document.getElementById("cell-g_" + id);
  if(!el) return;
  el.classList.add("wrongflash");
  setTimeout(()=>el.classList.remove("wrongflash"), 550);
}
let geoRestoreTimer = null;
function revealRegion(id){
  /* zoom out so the pulse is visible, then restore the user's framing */
  const saved = geoView && geoView.w < geoBase.w - 0.5
    ? { x:geoView.x, y:geoView.y, w:geoView.w, h:geoView.h } : null;
  geoResetZoom();
  const el = document.getElementById("cell-g_" + id);
  if(el){
    el.classList.add("reveal");
    setTimeout(()=>el.classList.remove("reveal"), 1600);
  }
  if(saved){
    clearTimeout(geoRestoreTimer);
    geoRestoreTimer = setTimeout(()=>{
      if(geoSvg){ geoView = saved; setGeoViewBox(); }
    }, 1750);
  }
}

function tapRegion(id, name){
  if(locked || !session || !isGeo(session.op)) return;
  const f = factIndex[currentKey()];
  tickTime();
  if("g:" + id === f.key){
    locked = true;
    session.status[f.key] = "green";
    session.queue.shift();
    saveStore();
    paintCell(f.key);
    playDing();
    setGeoStatus("Nice!");
    setTimeout(nextCard, 650);
  }else if(attempt === 1){
    attempt = 2;
    session.everMissed = session.everMissed || {};
    session.everMissed[f.key] = true;
    saveStore();
    flashRegion(id);
    playThunk();
    setGeoStatus("That's " + name + " — try again");
  }else{
    /* second miss: reveal the answer, requeue; region stays neutral
       on the map so the retry isn't given away */
    session.everMissed[f.key] = true;
    session.requeued[f.key] = true;
    session.queue.shift();
    const pos = Math.min(4 + Math.floor(Math.random()*3), session.queue.length);
    session.queue.splice(pos, 0, f.key);
    saveStore();
    locked = true;
    flashRegion(id);
    playThunk();
    revealRegion(f.answer);
    setGeoStatus("This is " + f.name + " — it'll come back");
    speak(f.name);
    setTimeout(nextCard, 1900);
  }
}

document.getElementById("speakBtn").addEventListener("click", ()=>{
  if(session && isGeo(session.op) && session.queue.length)
    speak(factIndex[currentKey()].name);
});

/* =================== timer =================== */
function startTimer(){
  stopTimer();
  timerId = setInterval(()=>{
    if(!session) return;
    const live = session.elapsedMs + Math.min(Date.now()-session.lastActivity, IDLE_CAP_MS);
    document.getElementById("sTimer").textContent = fmtTime(Math.round(live/1000));
  }, 1000);
}
function stopTimer(){ if(timerId){ clearInterval(timerId); timerId = null; } }
function fmtTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return m + ":" + String(s).padStart(2,"0");
}

/* =================== board grid =================== */
function buildGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const op = session.op, lvl = session.level;

  /* add/sub: a strip of problem dots, no headers */
  if(op === "add" || op === "sub"){
    grid.style.gridTemplateColumns = "repeat(10, 24px)";
    for(const f of Object.values(factIndex)){
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.id = "cell-" + f.key.replace(/:/g,"_");
      if(session.status[f.key]) cell.classList.add(session.status[f.key]);
      grid.appendChild(cell);
    }
    return;
  }

  let rows, cols = range(0,12), prefix;
  if(op === "mult"){ rows = lvl==="beginner" ? range(0,5) : range(0,12); prefix = "m"; }
  else { rows = lvl==="beginner" ? range(1,5) : range(1,12); prefix = "d"; }
  grid.style.gridTemplateColumns = `repeat(${cols.length+1}, 24px)`;

  const corner = document.createElement("div");
  corner.className = "hdr";
  corner.textContent = OPSYM[op];
  grid.appendChild(corner);
  for(const c of cols){
    const h = document.createElement("div");
    h.className = "hdr"; h.textContent = c;
    grid.appendChild(h);
  }
  for(const r of rows){
    const h = document.createElement("div");
    h.className = "hdr"; h.textContent = r;
    grid.appendChild(h);
    for(const c of cols){
      const key = `${prefix}:${r}:${c}`;
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.id = "cell-" + key.replace(/:/g,"_");
      if(session.status[key]) cell.classList.add(session.status[key]);
      grid.appendChild(cell);
    }
  }
}
function paintCell(key){
  const el = document.getElementById("cell-" + key.replace(/:/g,"_"));
  if(el){
    el.classList.remove("green","yellow");
    if(session.status[key]) el.classList.add(session.status[key]);
  }
  updateHud();
}
function highlightCurrent(key){
  if(!session || isGeo(session.op)) return;
  document.querySelectorAll(".cell.current").forEach(c=>c.classList.remove("current"));
  const el = document.getElementById("cell-" + key.replace(/:/g,"_"));
  if(el) el.classList.add("current");
}
function updateHud(){
  if(!session) return;
  const done = Object.keys(session.status).filter(k=>{
    /* a fact is "done" once it's off the queue */
    return session.queue.indexOf(k) === -1;
  }).length;
  document.getElementById("sProgress").textContent = done + " / " + session.totalFacts;
  const g = Object.values(session.status).filter(v=>v==="green").length;
  const y = Object.values(session.status).filter(v=>v==="yellow").length;
  document.getElementById("boardCount").textContent = g + " green · " + y + " yellow";
}

/* =================== home =================== */
let selLearner = store.lastLearner || null;
let selOp = "mult";
let selLevel = "beginner";

function renderHome(){
  document.querySelectorAll(".learner-btn").forEach(b=>{
    b.classList.toggle("selected", b.dataset.learner === selLearner);
  });
  document.querySelectorAll("#opRow .toggle-btn").forEach(b=>{
    b.classList.toggle("selected", b.dataset.op === selOp);
  });
  document.querySelectorAll("#levelRow .toggle-btn").forEach(b=>{
    b.classList.toggle("selected", b.dataset.level === selLevel);
  });
  const note = document.getElementById("levelNote");
  const beg = selLevel === "beginner";
  document.getElementById("levelRow").classList.toggle("hidden", isGeo(selOp));
  if(selOp === "usa"){
    note.textContent = "Tap all 50 states on the map as they're called out.";
  }else if(selOp === "canada"){
    note.textContent = "Tap all 13 provinces and territories as they're called out.";
  }else if(selOp === "mult"){
    note.textContent = beg
      ? "Beginner: 0s through 5s times tables (78 facts)."
      : "Advanced: the full board, 0s through 12s (169 facts).";
  }else if(selOp === "div"){
    note.textContent = beg
      ? "Beginner: dividing by 1 through 5 (65 facts)."
      : "Advanced: dividing by 1 through 12 (156 facts).";
  }else if(selOp === "add"){
    note.textContent = beg
      ? "Beginner: 30 problems, numbers up to 20 (like 20 + 20)."
      : "Advanced: 30 big-number problems up to 9999, most need carrying.";
  }else{
    note.textContent = beg
      ? "Beginner: 30 problems, numbers up to 20, never negative."
      : "Advanced: 30 big-number problems up to 9999, most need borrowing.";
  }
  const resume = document.getElementById("resumeBtn");
  const act = selLearner ? store.active[selLearner] : null;
  if(act){
    const done = act.totalFacts - act.queue.length;
    resume.textContent = "Resume " + selLearner + " (" + done + " / " + act.totalFacts + ")";
    resume.classList.remove("hidden");
  }else{
    resume.classList.add("hidden");
  }
}

document.querySelectorAll(".learner-btn").forEach(b=>{
  b.addEventListener("click", ()=>{ selLearner = b.dataset.learner; store.lastLearner = selLearner; saveStore(); renderHome(); });
});
document.querySelectorAll("#opRow .toggle-btn").forEach(b=>{
  b.addEventListener("click", ()=>{ selOp = b.dataset.op; renderHome(); });
});
document.querySelectorAll("#levelRow .toggle-btn").forEach(b=>{
  b.addEventListener("click", ()=>{ selLevel = b.dataset.level; renderHome(); });
});

document.getElementById("startBtn").addEventListener("click", ()=>{
  if(!selLearner){
    const warn = document.getElementById("homeWarn");
    warn.textContent = "Pick a learner first";
    warn.classList.remove("hidden");
    setTimeout(()=>warn.classList.add("hidden"), 2000);
    return;
  }
  /* any unfinished session for this learner is saved to reports as partial */
  if(store.active[selLearner]) archiveAbandoned(selLearner);
  beginSession(newSession(selLearner, selOp, selLevel));
});

document.getElementById("resumeBtn").addEventListener("click", ()=>{
  const s = store.active[selLearner];
  if(!s) return;
  s.lastActivity = Date.now();
  beginSession(s);
});

document.getElementById("endBtn").addEventListener("click", ()=>{
  if(!session) return;
  finalize(false);
});

/* =================== keypad + keyboard =================== */
document.querySelectorAll(".key").forEach(b=>{
  b.addEventListener("click", ()=>press(b.dataset.k));
});
document.addEventListener("keydown", e=>{
  if(document.getElementById("session").classList.contains("hidden")) return;
  if(e.key >= "0" && e.key <= "9") press(e.key);
  else if(e.key === "Backspace") press("back");
  else if(e.key === "Enter") press("enter");
});

/* =================== done screen =================== */
document.getElementById("doneHomeBtn").addEventListener("click", ()=>{ renderHome(); showScreen("home"); });
document.getElementById("doneReportsBtn").addEventListener("click", ()=>{ openReports(); });

/* =================== reports =================== */
let reportTab = "George";
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click", ()=>{ reportTab = t.dataset.tab; renderReports(); });
});
document.getElementById("reportsBtn").addEventListener("click", openReports);
document.getElementById("reportsHomeBtn").addEventListener("click", ()=>{ renderHome(); showScreen("home"); });

function openReports(){
  if(store.lastLearner) reportTab = store.lastLearner;
  renderReports();
  showScreen("reports");
}

function renderReports(){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("selected", t.dataset.tab===reportTab));
  const list = document.getElementById("sessionList");
  list.innerHTML = "";
  const rows = store.sessions.filter(s=>s.learner===reportTab);
  if(rows.length===0){
    list.innerHTML = '<div class="empty-note">No sessions yet for ' + reportTab + ".</div>";
    return;
  }
  for(const s of rows){
    const row = document.createElement("div");
    row.className = "session-row";
    const head = document.createElement("button");
    head.className = "session-head";
    const d = new Date(s.startedAt);
    const when = d.toLocaleDateString(undefined,{month:"short",day:"numeric"}) + ", " +
                 d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
    head.innerHTML =
      '<div class="s-op">' + (OPSYM[s.op] || "×") + '</div>' +
      '<div class="s-main"><div class="s-title">' + (s.level==="beginner"?"Beginner":"Advanced") + '</div>' +
      '<div class="s-date">' + when + '</div></div>' +
      '<div class="s-stats">' +
        '<span><span class="dot green"></span>' + s.greenCount + '</span>' +
        '<span><span class="dot yellow"></span>' + s.yellowCount + '</span>' +
        (s.unansweredCount ? '<span><span class="dot pending"></span>' + s.unansweredCount + '</span>' : '') +
        '<span>' + fmtTime(s.durationSec) + '</span>' +
      '</div>' +
      '<span class="badge ' + (s.completed?"done":"partial") + '">' + (s.completed?"Completed":"Partial") + '</span>';
    row.appendChild(head);

    if(s.missed && s.missed.length){
      const missed = document.createElement("div");
      missed.className = "missed-list hidden";
      missed.innerHTML = '<div class="missed-label">Needed a retry</div>' +
        s.missed.map(m=>'<span class="missed-chip">'+m+'</span>').join("");
      row.appendChild(missed);
      head.addEventListener("click", ()=>missed.classList.toggle("hidden"));
    }
    list.appendChild(row);
  }
}

let resetArmed = false;
document.getElementById("resetBtn").addEventListener("click", ()=>{
  const btn = document.getElementById("resetBtn");
  if(!resetArmed){
    resetArmed = true;
    btn.textContent = "Tap again to erase everything — this can't be undone";
    setTimeout(()=>{ resetArmed = false; btn.textContent = "Erase all data on this iPad"; }, 4000);
    return;
  }
  store = { lastLearner:null, active:{}, sessions:[] };
  saveStore();
  selLearner = null;
  resetArmed = false;
  btn.textContent = "Erase all data on this iPad";
  renderReports();
});

/* =================== screens & lifecycle =================== */
function showScreen(id){
  for(const s of ["home","session","done","reports"])
    document.getElementById(s).classList.toggle("hidden", s!==id);
}

/* save on background so nothing is lost mid-drive */
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden && session){ tickTime(); saveStore(); }
  else if(!document.hidden && session){ session.lastActivity = Date.now(); }
});

/* service worker for full offline once hosted */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

renderHome();
</script>
